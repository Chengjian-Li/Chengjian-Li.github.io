{% assign news_items = site.news | sort: "date" | reverse | slice: 0, include.limit -%}

<section class="cv-section">
    <h2>News</h2>
    <ul class="news-list">
        {% for item in news_items %}
        <li>
            <span class="news-date">[{{ item.date | date: "%m/%Y" }}]</span>
            {{ item.title }}
        </li>
        {% endfor %}
    </ul>
</section>
